<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SISLOT — Cadastro de Bolões</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="./css/sislot-base.css" />
  <link rel="stylesheet" href="./css/sislot-components.css" />
  <link rel="stylesheet" href="./css/bolao-cadastro.css" />
</head>
<body data-loja="centro">

  <header class="sl-header">
    <div class="sl-header-inner">
      <div class="sl-loja-logo" id="lojaTreeWrap" title="Loja ativa">
        <img src="./icons/centro.png" alt="Loja" id="logoImg" />
      </div>

      <div class="sl-header-info header-info">
        <div class="sl-header-nome header-nome" id="headerTitle">Centro</div>
        <div class="sl-header-sub header-sub" id="headerSub">SISLOT · Cadastro</div>
      </div>

      <div class="sl-loja-select">
        <select id="sl-loja-select" aria-label="Selecionar loja"></select>
      </div>

      <div class="sl-header-clock" id="relogio">--:--:--</div>

      <a href="./menu.html" class="sl-btn-header" id="btnInicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Início
      </a>

      <button type="button" class="sl-btn sl-btn--danger sl-btn--sm" id="btnSair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair
      </button>
    </div>
  </header>

  <main class="sl-main sl-main--narrow">
    <div class="sl-page-header">
      <div>
        <h1 class="sl-page-title">Cadastro</h1>
        <p class="sl-page-sub">Criação do bolão base. A movimentação acontece no módulo próprio.</p>
      </div>
    </div>

    <div class="quickbar" id="quickZone">
      <div class="quickbar-grid" id="modGrid"></div>
      <div class="quickchips" id="chipsWrap">
        <div class="chips-row" id="chipsRow"></div>
      </div>
    </div>

    <div class="sl-card card">
      <div class="section-header">
        <div class="section-icon"><i class="fas fa-ticket-alt"></i></div>
        <h2 class="section-title">
          Dados do bolão
          <span class="origem-chip origem-chip-clickable" id="origemChip" title="Trocar loja">
            <i class="fas fa-store"></i> <span id="origemNome">—</span>
          </span>
        </h2>
      </div>

      <div class="grid-2">
        <div class="field">
          <label><i class="fas fa-clover"></i> Modalidade</label>
          <select id="modalidade">
            <option value="">Selecione…</option>
            <option>Mega Sena</option><option>Lotofácil</option><option>Quina</option>
            <option>Dupla Sena</option><option>Dia de Sorte</option><option>Supersete</option>
            <option>Milionária</option><option>Timemania</option><option>Loteca</option>
            <option>Páscoa</option><option>São João</option><option>Independência</option><option>Virada</option>
          </select>
        </div>
        <div class="field">
          <label class="label-row">
            <span><i class="fas fa-hashtag"></i> Concurso</span>
            <span class="day-stepper">
              <button type="button" class="day-btn" id="btnConcursoPrev" aria-label="Concurso anterior"><i class="fas fa-chevron-left"></i></button>
              <button type="button" class="day-btn" id="btnConcursoNext" aria-label="Próximo concurso"><i class="fas fa-chevron-right"></i></button>
            </span>
          </label>
          <input id="concurso" inputmode="numeric" placeholder="Ex: 2940" />
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="label-row">
            <span><i class="fas fa-calendar-day"></i> Data inicial</span>
            <span class="day-stepper">
              <button type="button" class="day-btn" id="btnDiPrev"><i class="fas fa-chevron-left"></i></button>
              <button type="button" class="day-btn" id="btnDiNext"><i class="fas fa-chevron-right"></i></button>
            </span>
          </label>
          <input id="dataInicial" type="date" />
        </div>
        <div class="field">
          <label class="label-row">
            <span><i class="fas fa-calendar-check"></i> Data concurso</span>
            <span class="day-stepper">
              <button type="button" class="day-btn" id="btnDcPrev"><i class="fas fa-chevron-left"></i></button>
              <button type="button" class="day-btn" id="btnDcNext"><i class="fas fa-chevron-right"></i></button>
            </span>
          </label>
          <input id="dataConcurso" type="date" />
        </div>
      </div>

      <div class="grid-2">
        <div class="field"><label><i class="fas fa-list-ol"></i> Qtd jogos</label><input id="qtdJogos" inputmode="numeric" placeholder="Ex: 10" /></div>
        <div class="field"><label><i class="fas fa-dice"></i> Dezenas</label><input id="qtdDezenas" inputmode="numeric" placeholder="Ex: 8" /></div>
      </div>

      <div class="grid-2">
        <div class="field"><label><i class="fas fa-money-bill-wave"></i> Valor da cota (R$)</label><input id="valorCota" inputmode="decimal" placeholder="Ex: 22,68" /></div>
        <div class="field"><label><i class="fas fa-users"></i> Qtd cotas</label><input id="cotas" inputmode="numeric" placeholder="Ex: 100" /></div>
      </div>

      <div class="actions-3">
        <button class="sl-btn sl-btn--primary" id="btnCadastrar"><span class="sl-btn-text"><i class="fas fa-check"></i> Cadastrar</span></button>
        <button class="sl-btn sl-btn--ghost" id="btnLimpar"><span class="sl-btn-text"><i class="fas fa-eraser"></i> Limpar</span></button>
        <button class="sl-btn sl-btn--danger" id="btnDeletar"><span class="sl-btn-text"><i class="fas fa-ban"></i> Cancelar</span></button>
      </div>

      <div id="status" class="sl-status-bar status muted"><i class="fas fa-info-circle"></i><span>Pronto.</span></div>
    </div>
  </main>

  <div class="sl-modal-overlay modal-overlay" id="modalOverlay">
    <div class="sl-modal modal" id="modalBox">
      <div class="modal-header">
        <div class="modal-icon"><i class="fas fa-question-circle"></i></div>
        <h3 class="modal-title" id="modalTitle">Confirmação</h3>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions">
        <button class="sl-btn sl-btn--ghost" id="modalCancel"><span class="sl-btn-text"><i class="fas fa-times"></i> Cancelar</span></button>
        <button class="sl-btn sl-btn--primary" id="modalConfirm"><span class="sl-btn-text"><i class="fas fa-check"></i> Confirmar</span></button>
      </div>
    </div>
  </div>

  <footer class="sl-footer">SISLOT v3.0 · Cadastro de Bolões</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./sislot-config.js"></script>
  <script src="./sislot-security.js"></script>
  <script src="./js/sislot-utils.js"></script>
  <script src="./js/sislot-theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.SISLOT_THEME) window.SISLOT_THEME.init('centro');
    });
  </script>
  <script src="./js/bolao-cadastro.js"></script>
</body>
</html>
